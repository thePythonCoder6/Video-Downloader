<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Downloader Pro</title>

<style>
:root {
    --primary: #6366f1;
    --primary-hover: #4f46e5;
    --secondary: #8b5cf6;
    --success: #10b981;
    --danger: #ef4444;
    --warning: #f59e0b;
    --dark-bg: #0f172a;
    --card-bg: #1e293b;
    --card-hover: #334155;
    --input-bg: #0f172a;
    --border: #334155;
    --text-muted: #94a3b8;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
    color: white;
    min-height: 100vh;
    padding: 20px;
    line-height: 1.6;
}

.main-wrapper {
    max-width: 1200px;
    margin: 0 auto;
}

.header {
    text-align: center;
    margin-bottom: 40px;
    animation: fadeInDown 0.6s ease;
}

.header h1 {
    font-size: 2.5rem;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 10px;
    font-weight: 800;
}

.header p {
    color: var(--text-muted);
    font-size: 1.1rem;
}

.container {
    background: var(--card-bg);
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    text-align: center;
    margin-bottom: 30px;
    backdrop-filter: blur(10px);
    border: 1px solid var(--border);
    animation: fadeInUp 0.6s ease;
}

.logout-btn {
    position: absolute;
    top: 20px;
    right: 20px;
    padding: 10px 20px;
    background: var(--danger);
    border: none;
    border-radius: 12px;
    color: white;
    cursor: pointer;
    font-weight: 600;
    transition: all 0.3s ease;
}

.logout-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 25px rgba(239, 68, 68, 0.3);
}

.input-group {
    margin: 20px 0;
}

.input-group label {
    display: block;
    text-align: left;
    margin-bottom: 8px;
    color: var(--text-muted);
    font-weight: 600;
    font-size: 0.9rem;
}

input, select, textarea {
    width: 100%;
    max-width: 600px;
    padding: 14px 18px;
    background: var(--input-bg);
    border: 2px solid var(--border);
    border-radius: 12px;
    color: white;
    font-size: 15px;
    transition: all 0.3s ease;
    font-family: inherit;
}

input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
}

textarea {
    resize: vertical;
    font-size: 13px;
}

.btn {
    padding: 14px 32px;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    display: inline-flex;
    align-items: center;
    gap: 8px;
}

.btn-primary {
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    color: white;
}

.btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 30px rgba(99, 102, 241, 0.4);
}

.btn-secondary {
    background: var(--success);
    color: white;
}

.btn-secondary:hover {
    background: #059669;
    transform: translateY(-2px);
}

.btn-danger {
    background: var(--danger);
    color: white;
}

.btn-danger:hover {
    background: #dc2626;
    transform: translateY(-2px);
}

.btn-small {
    padding: 8px 16px;
    font-size: 13px;
}

#videoPlayer {
    display: none;
    background: var(--card-bg);
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    border: 1px solid var(--border);
    margin-bottom: 30px;
    animation: fadeInUp 0.6s ease;
}

#videoPlayer video {
    width: 100%;
    max-width: 100%;
    border-radius: 12px;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
}

.video-controls {
    margin-top: 20px;
    display: flex;
    gap: 15px;
    justify-content: center;
    flex-wrap: wrap;
}

#historyContainer {
    background: var(--card-bg);
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    border: 1px solid var(--border);
    margin-top: 30px;
    animation: fadeInUp 0.8s ease;
}

#historyContainer h3 {
    margin-bottom: 25px;
    font-size: 1.5rem;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    display: flex;
    align-items: center;
    gap: 10px;
}

.history-item {
    background: var(--input-bg);
    padding: 20px;
    margin: 15px 0;
    border-radius: 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border: 2px solid var(--border);
    transition: all 0.3s ease;
    animation: slideIn 0.4s ease;
}

.history-item:hover {
    border-color: var(--primary);
    transform: translateX(5px);
    box-shadow: 0 10px 30px rgba(99, 102, 241, 0.2);
}

@keyframes slideIn {
    from {
        opacity: 0;
        transform: translateX(-20px);
    }
    to {
        opacity: 1;
        transform: translateX(0);
    }
}

.history-info {
    flex: 1;
    text-align: left;
    margin-right: 20px;
}

.history-title {
    font-weight: 700;
    margin-bottom: 8px;
    color: #fff;
    font-size: 1.05rem;
}

.history-url {
    font-size: 0.8rem;
    color: var(--primary);
    margin-bottom: 5px;
    word-break: break-all;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 5px;
    transition: all 0.2s ease;
}

.history-url:hover {
    color: var(--secondary);
    text-decoration: underline;
}

.history-date {
    font-size: 0.8rem;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 5px;
}

.history-buttons {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
}

.history-buttons button {
    padding: 10px 16px;
    font-size: 13px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-weight: 600;
    transition: all 0.3s ease;
}

.history-buttons button:hover {
    transform: translateY(-2px);
}

.format-dropdown {
    position: relative;
    display: inline-block;
}

.format-menu {
    display: none;
    position: absolute;
    bottom: 100%;
    right: 0;
    background: var(--card-bg);
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 10px 0;
    margin-bottom: 10px;
    min-width: 180px;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
    z-index: 1000;
    animation: menuSlide 0.2s ease;
}

@keyframes menuSlide {
    from {
        opacity: 0;
        transform: translateY(10px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.format-menu.show {
    display: block;
}

.format-menu-section {
    padding: 8px 16px;
    font-size: 0.7rem;
    color: var(--text-muted);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 5px;
}

.format-menu button {
    display: block;
    width: 100%;
    padding: 10px 16px;
    font-size: 13px;
    background: transparent;
    border: none;
    color: white;
    text-align: left;
    cursor: pointer;
    transition: all 0.2s ease;
    font-weight: 500;
}

.format-menu button:hover {
    background: var(--card-hover);
    padding-left: 20px;
}

.empty-history {
    color: var(--text-muted);
    font-style: italic;
    padding: 40px;
    text-align: center;
    font-size: 1.1rem;
}

.info-box {
    background: rgba(99, 102, 241, 0.1);
    border: 1px solid var(--primary);
    border-radius: 12px;
    padding: 15px;
    margin-top: 20px;
    font-size: 0.9rem;
    color: var(--text-muted);
}

.info-box a {
    color: var(--primary);
    text-decoration: none;
    font-weight: 600;
}

.info-box a:hover {
    text-decoration: underline;
}

#status {
    margin-top: 20px;
    font-size: 1rem;
}

@keyframes fadeInDown {
    from {
        opacity: 0;
        transform: translateY(-30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

@keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

@media (max-width: 768px) {
    .header h1 {
        font-size: 1.8rem;
    }
    
    .container {
        padding: 25px;
    }
    
    .history-item {
        flex-direction: column;
        align-items: flex-start;
        gap: 15px;
    }
    
    .history-buttons {
        width: 100%;
        justify-content: flex-start;
    }
    
    .logout-btn {
        position: static;
        margin-bottom: 20px;
        width: 100%;
    }
}
</style>
</head>

<body>

<button onclick="logout()" class="logout-btn">🚪 Logout</button>

<div class="main-wrapper">
    <div class="header">
        <h1>🎬 Video Downloader Pro</h1>
        <p>Download videos and audio from any supported platform</p>
    </div>

    <div class="container">
        <div class="input-group">
            <label for="url">🔗 Video URL</label>
            <input id="url" placeholder="Paste your video URL here..." autocomplete="off">
        </div>

        <div class="input-group">
            <label for="format">📦 Output Format</label>
            <select id="format">
                <optgroup label="📹 Video Formats">
                    <option value="mp4" selected>MP4 (Best Quality)</option>
                    <option value="webm">WebM</option>
                    <option value="mkv">MKV</option>
                    <option value="avi">AVI</option>
                    <option value="mov">MOV</option>
                    <option value="flv">FLV</option>
                </optgroup>
                <optgroup label="🎵 Audio Formats">
                    <option value="mp3">MP3 (192kbps)</option>
                    <option value="m4a">M4A (192kbps)</option>
                    <option value="wav">WAV (Lossless)</option>
                    <option value="flac">FLAC (Lossless)</option>
                    <option value="aac">AAC (192kbps)</option>
                    <option value="opus">Opus (192kbps)</option>
                    <option value="vorbis">Vorbis/OGG (192kbps)</option>
                </optgroup>
            </select>
        </div>

        <div class="input-group">
            <label for="cookies">🍪 Cookies (Optional)</label>
            <textarea id="cookies" placeholder="Paste cookies for YouTube bot protection (optional)" rows="3"></textarea>
        </div>

        <button onclick="start()" class="btn btn-primary">⚡ Download Now</button>

        <p id="status"></p>

        <div class="info-box">
            💡 <strong>Pro Tip:</strong> Cookies are optional! We automatically fallback to Invidious for YouTube.<br>
            <a href="https://github.com/yt-dlp/yt-dlp/wiki/FAQ#how-do-i-pass-cookies-to-yt-dlp" target="_blank">Learn how to export cookies →</a>
        </div>
    </div>

    <div id="videoPlayer">
        <video id="video" controls>
            <source id="videoSource" type="video/mp4">
            Your browser does not support the video tag.
        </video>
        <div class="video-controls">
            <button onclick="downloadVideo()" class="btn btn-secondary">⬇️ Download Video</button>
            <button onclick="hideVideo()" class="btn btn-danger">✖️ Close Player</button>
        </div>
    </div>

    <div id="historyContainer">
        <h3>📼 Download History</h3>
        <div id="historyList">
            <p class="empty-history">No videos downloaded yet. Start by pasting a URL above!</p>
        </div>
    </div>
</div>

<script>
let currentVideoFile = null;
let downloadHistory = [];

// Load history from server
async function loadHistory() {
    try {
        const res = await fetch('/api/history');
        const data = await res.json();
        
        if (data.history) {
            downloadHistory = data.history;
            renderHistory();
        }
    } catch (err) {
        console.error('Failed to load history:', err);
    }
}

// Format date
function formatDate(isoString) {
    const date = new Date(isoString);
    const now = new Date();
    const diffMs = now - date;
    const diffMins = Math.floor(diffMs / 60000);
    const diffHours = Math.floor(diffMs / 3600000);
    const diffDays = Math.floor(diffMs / 86400000);
    
    if (diffMins < 1) return 'Just now';
    if (diffMins < 60) return `${diffMins} min ago`;
    if (diffHours < 24) return `${diffHours} hour${diffHours > 1 ? 's' : ''} ago`;
    if (diffDays < 7) return `${diffDays} day${diffDays > 1 ? 's' : ''} ago`;
    
    return date.toLocaleDateString();
}

// Render history list
function renderHistory() {
    const historyList = document.getElementById('historyList');
    
    if (downloadHistory.length === 0) {
        historyList.innerHTML = '<p class="empty-history">No videos downloaded yet</p>';
        return;
    }
    
    historyList.innerHTML = downloadHistory.map((item) => `
        <div class="history-item">
            <div class="history-info">
                <div class="history-title">${escapeHtml(item.title)}</div>
                <div class="history-url" onclick="copyToClipboard('${escapeHtml(item.url).replace(/'/g, "&#39;")}')" title="Click to copy URL">🔗 ${truncateUrl(item.url)}</div>
                <div class="history-date">${formatDate(item.timestamp)}</div>
            </div>
            <div class="history-buttons">
                <button onclick="playHistoryVideo('${item.file}')" class="btn-primary btn-small">▶️ Watch</button>
                <div class="format-dropdown">
                    <button onclick="toggleFormatMenu('${item.id}')" class="btn-secondary btn-small">⬇️ Download ▾</button>
                    <div id="format-menu-${item.id}" class="format-menu">
                        <div class="format-menu-section">VIDEO FORMATS</div>
                        <button onclick="convertAndDownload('${item.filename}', 'mp4', '${item.id}')">MP4</button>
                        <button onclick="convertAndDownload('${item.filename}', 'webm', '${item.id}')">WebM</button>
                        <button onclick="convertAndDownload('${item.filename}', 'mkv', '${item.id}')">MKV</button>
                        <button onclick="convertAndDownload('${item.filename}', 'avi', '${item.id}')">AVI</button>
                        <div class="format-menu-section">AUDIO FORMATS</div>
                        <button onclick="convertAndDownload('${item.filename}', 'mp3', '${item.id}')">MP3</button>
                        <button onclick="convertAndDownload('${item.filename}', 'm4a', '${item.id}')">M4A</button>
                        <button onclick="convertAndDownload('${item.filename}', 'wav', '${item.id}')">WAV</button>
                        <button onclick="convertAndDownload('${item.filename}', 'flac', '${item.id}')">FLAC</button>
                    </div>
                </div>
                <button onclick="deleteHistoryItem('${item.id}')" class="btn-danger btn-small">🗑️</button>
            </div>
        </div>
    `).join('');
}

// Truncate URL for display
function truncateUrl(url) {
    if (url.length > 60) {
        return url.substring(0, 57) + '...';
    }
    return url;
}

// Copy URL to clipboard
function copyToClipboard(url) {
    // Decode HTML entities
    const textarea = document.createElement('textarea');
    textarea.innerHTML = url;
    const decodedUrl = textarea.value;
    
    navigator.clipboard.writeText(decodedUrl).then(() => {
        // Show brief notification
        const notification = document.createElement('div');
        notification.textContent = '✅ URL copied!';
        notification.style.cssText = 'position:fixed;top:20px;right:20px;background:#2ecc71;color:white;padding:12px 20px;border-radius:8px;z-index:9999;animation:fadeIn 0.3s;';
        document.body.appendChild(notification);
        setTimeout(() => {
            notification.style.animation = 'fadeOut 0.3s';
            setTimeout(() => notification.remove(), 300);
        }, 2000);
    }).catch(() => {
        alert('Failed to copy URL');
    });
}

// Add fade animations
const style = document.createElement('style');
style.textContent = `
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-10px); }
        to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeOut {
        from { opacity: 1; transform: translateY(0); }
        to { opacity: 0; transform: translateY(-10px); }
    }
`;
document.head.appendChild(style);

// Escape HTML to prevent XSS
function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// Play video from history
function playHistoryVideo(file) {
    currentVideoFile = file;
    playVideo();
}

// Download video from history
function downloadHistoryVideo(file) {
    window.location.href = file;
}

// Toggle format menu
function toggleFormatMenu(videoId) {
    const menu = document.getElementById(`format-menu-${videoId}`);
    
    // Close all other menus
    document.querySelectorAll('.format-menu').forEach(m => {
        if (m !== menu) m.classList.remove('show');
    });
    
    menu.classList.toggle('show');
}

// Close format menus when clicking outside
document.addEventListener('click', (e) => {
    if (!e.target.closest('.format-dropdown')) {
        document.querySelectorAll('.format-menu').forEach(m => {
            m.classList.remove('show');
        });
    }
});

// Convert and download video
async function convertAndDownload(filename, format, videoId) {
    const menu = document.getElementById(`format-menu-${videoId}`);
    menu.classList.remove('show');
    
    // Show loading indicator
    const historyItem = menu.closest('.history-item');
    const originalHTML = historyItem.innerHTML;
    historyItem.innerHTML = '<div style="text-align:center;padding:20px;">🔄 Converting to ' + format.toUpperCase() + '...</div>';
    
    try {
        const formData = new FormData();
        formData.append('filename', filename);
        formData.append('target_format', format);
        
        const res = await fetch('/api/convert', {
            method: 'POST',
            body: formData
        });
        
        const data = await res.json();
        
        if (data.error) {
            alert('Conversion failed: ' + data.error);
            historyItem.innerHTML = originalHTML;
            return;
        }
        
        // Download the converted file
        window.location.href = data.file;
        
        // Restore UI after a moment
        setTimeout(() => {
            historyItem.innerHTML = originalHTML;
        }, 1000);
        
    } catch (err) {
        alert('Conversion failed: ' + err.message);
        historyItem.innerHTML = originalHTML;
    }
}

// Delete history item
async function deleteHistoryItem(videoId) {
    if (confirm('Remove this video from history? This will also delete the file.')) {
        try {
            const res = await fetch(`/api/history/${videoId}`, {
                method: 'DELETE'
            });
            
            if (res.ok) {
                // Reload history from server
                await loadHistory();
            }
        } catch (err) {
            alert('Failed to delete video');
        }
    }
}

// Clear all history
async function clearAllHistory() {
    if (confirm('Clear all download history? This will delete all video files.')) {
        try {
            const res = await fetch('/api/history/clear', {
                method: 'POST'
            });
            
            if (res.ok) {
                downloadHistory = [];
                renderHistory();
            }
        } catch (err) {
            alert('Failed to clear history');
        }
    }
}

// Load history on page load
loadHistory();

async function start() {
    const url = document.getElementById("url").value;
    const cookies = document.getElementById("cookies").value;
    const format = document.getElementById("format").value;
    const status = document.getElementById("status");

    status.textContent = "Processing...";

    const form = new FormData();
    form.append("url", url);
    form.append("cookies", cookies);
    form.append("format", format);

    try {
        const res = await fetch("/api/download", {
            method: "POST",
            body: form
        });

        const data = await res.json();

        if (data.error) {
            if (data.error === "Unauthorized") {
                window.location.href = "/";
                return;
            }
            status.textContent = data.error;
            return;
        }

        currentVideoFile = data.file;
        
        // Reload history from server
        await loadHistory();
        
        const format = document.getElementById("format").value;
        const audioFormats = ['mp3', 'm4a', 'wav', 'flac', 'aac', 'opus', 'vorbis'];
        const isAudio = audioFormats.includes(format);
        
        if (isAudio) {
            status.innerHTML = `
                <div style="margin-top: 20px;">
                    <a href="${data.file}" class="btn btn-secondary" style="text-decoration: none;">🎵 Download Audio</a>
                </div>
            `;
        } else {
            status.innerHTML = `
                <div style="margin-top: 20px; display: flex; gap: 15px; justify-content: center; flex-wrap: wrap;">
                    <button onclick="playVideo()" class="btn btn-primary">▶️ Watch Now</button>
                    <a href="${data.file}" class="btn btn-secondary" style="text-decoration: none;">⬇️ Download</a>
                </div>
            `;
        }

    } catch {
        status.textContent = "Request failed";
    }
}

function playVideo() {
    if (!currentVideoFile) return;
    
    const videoPlayer = document.getElementById("videoPlayer");
    const videoSource = document.getElementById("videoSource");
    const video = document.getElementById("video");
    
    videoSource.src = currentVideoFile;
    video.load();
    videoPlayer.style.display = "block";
    
    // Scroll to video player
    videoPlayer.scrollIntoView({ behavior: "smooth", block: "center" });
}

function hideVideo() {
    const videoPlayer = document.getElementById("videoPlayer");
    const video = document.getElementById("video");
    
    video.pause();
    videoPlayer.style.display = "none";
}

function downloadVideo() {
    if (!currentVideoFile) return;
    window.location.href = currentVideoFile;
}

async function logout() {
    try {
        await fetch("/api/logout", { method: "POST" });
        window.location.href = "/";
    } catch {
        window.location.href = "/";
    }
}

// Cleanup on page unload
window.addEventListener('beforeunload', () => {
    const video = document.getElementById('video');
    if (video) {
        video.pause();
        video.src = '';
    }
});
</script>

</body>
</html>
