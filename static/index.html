<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Downloader</title>

<style>
body {
    margin:0;
    font-family: Arial, sans-serif;
    background:#121212;
    color:white;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
    min-height:100vh;
    padding:20px;
}

.container {
    background:#1e1e1e;
    padding:30px;
    border-radius:12px;
    box-shadow:0 0 20px rgba(0,0,0,0.4);
    text-align:center;
    margin-bottom:20px;
    max-width:800px;
    width:100%;
}

input {
    width:320px;
    padding:10px;
    margin:10px 0;
}

select {
    width:344px;
    padding:10px;
    margin:10px 0;
    background:#2a2a2a;
    border:1px solid #444;
    border-radius:6px;
    color:white;
    font-size:14px;
}

button {
    padding:10px 18px;
    cursor:pointer;
}

#videoPlayer {
    display:none;
    background:#1e1e1e;
    padding:20px;
    border-radius:12px;
    box-shadow:0 0 20px rgba(0,0,0,0.4);
    max-width:800px;
    width:100%;
}

#videoPlayer video {
    width:100%;
    max-width:100%;
    border-radius:8px;
}

.video-controls {
    margin-top:15px;
    display:flex;
    gap:10px;
    justify-content:center;
}

#historyContainer {
    background:#1e1e1e;
    padding:20px;
    border-radius:12px;
    box-shadow:0 0 20px rgba(0,0,0,0.4);
    max-width:800px;
    width:100%;
    margin-top:20px;
}

#historyContainer h3 {
    margin-top:0;
    color:#4ea3ff;
}

.history-item {
    background:#2a2a2a;
    padding:15px;
    margin:10px 0;
    border-radius:8px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border:1px solid #333;
}

.history-item:hover {
    border-color:#4ea3ff;
}

.history-info {
    flex:1;
    text-align:left;
    margin-right:15px;
}

.history-title {
    font-weight:bold;
    margin-bottom:5px;
    color:#fff;
}

.history-date {
    font-size:11px;
    color:#888;
}

.history-buttons {
    display:flex;
    gap:8px;
}

.history-buttons button {
    padding:8px 12px;
    font-size:12px;
    border:none;
    border-radius:4px;
    cursor:pointer;
}

.empty-history {
    color:#888;
    font-style:italic;
}
</style>
</head>

<body>

<div class="container">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
        <h2 style="margin:0;">Video Downloader</h2>
        <button onclick="logout()" style="padding:6px 12px;font-size:12px;background:#ff5555;border:none;border-radius:4px;color:white;cursor:pointer;">Logout</button>
    </div>

    <input id="url" placeholder="Paste video URL">
    <br>
    <select id="format">
        <option value="video">Video (MP4)</option>
        <option value="mp3">Audio (MP3)</option>
        <option value="m4a">Audio (M4A)</option>
    </select>
    <br>
    <textarea id="cookies" placeholder="Paste cookies (optional - for YouTube bot protection)" rows="4" style="width:320px;margin:10px 0;padding:10px;font-size:12px;"></textarea>
    <br>
    <button onclick="start()">Download</button>

    <p id="status"></p>
    <p style="font-size:11px;color:#888;margin-top:20px;">
        📝 Cookies optional - we auto-fallback to Invidious for YouTube!<br>
        <a href="https://github.com/yt-dlp/yt-dlp/wiki/FAQ#how-do-i-pass-cookies-to-yt-dlp" target="_blank" style="color:#4ea3ff;">How to export cookies</a>
    </p>
</div>

<div id="videoPlayer">
    <video id="video" controls>
        <source id="videoSource" type="video/mp4">
        Your browser does not support the video tag.
    </video>
    <div class="video-controls">
        <button onclick="downloadVideo()" style="background:#4ea3ff;border:none;border-radius:4px;color:white;cursor:pointer;">Download Video</button>
        <button onclick="hideVideo()" style="background:#ff5555;border:none;border-radius:4px;color:white;cursor:pointer;">Close Player</button>
    </div>
</div>

<div id="historyContainer">
    <h3>📼 Download History</h3>
    <div id="historyList">
        <p class="empty-history">No videos downloaded yet</p>
    </div>
</div>

<script>
let currentVideoFile = null;
let downloadHistory = [];

// Load history from server
async function loadHistory() {
    try {
        const res = await fetch('/api/history');
        const data = await res.json();
        
        if (data.history) {
            downloadHistory = data.history;
            renderHistory();
        }
    } catch (err) {
        console.error('Failed to load history:', err);
    }
}

// Format date
function formatDate(isoString) {
    const date = new Date(isoString);
    const now = new Date();
    const diffMs = now - date;
    const diffMins = Math.floor(diffMs / 60000);
    const diffHours = Math.floor(diffMs / 3600000);
    const diffDays = Math.floor(diffMs / 86400000);
    
    if (diffMins < 1) return 'Just now';
    if (diffMins < 60) return `${diffMins} min ago`;
    if (diffHours < 24) return `${diffHours} hour${diffHours > 1 ? 's' : ''} ago`;
    if (diffDays < 7) return `${diffDays} day${diffDays > 1 ? 's' : ''} ago`;
    
    return date.toLocaleDateString();
}

// Render history list
function renderHistory() {
    const historyList = document.getElementById('historyList');
    
    if (downloadHistory.length === 0) {
        historyList.innerHTML = '<p class="empty-history">No videos downloaded yet</p>';
        return;
    }
    
    historyList.innerHTML = downloadHistory.map((item) => `
        <div class="history-item">
            <div class="history-info">
                <div class="history-title">${escapeHtml(item.title)}</div>
                <div class="history-date">${formatDate(item.timestamp)}</div>
            </div>
            <div class="history-buttons">
                <button onclick="playHistoryVideo('${item.file}')" style="background:#4ea3ff;color:white;">▶️ Watch</button>
                <button onclick="downloadHistoryVideo('${item.file}')" style="background:#2ecc71;color:white;">⬇️</button>
                <button onclick="deleteHistoryItem('${item.id}')" style="background:#ff5555;color:white;">🗑️</button>
            </div>
        </div>
    `).join('');
}

// Escape HTML to prevent XSS
function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// Play video from history
function playHistoryVideo(file) {
    currentVideoFile = file;
    playVideo();
}

// Download video from history
function downloadHistoryVideo(file) {
    window.location.href = file;
}

// Delete history item
async function deleteHistoryItem(videoId) {
    if (confirm('Remove this video from history? This will also delete the file.')) {
        try {
            const res = await fetch(`/api/history/${videoId}`, {
                method: 'DELETE'
            });
            
            if (res.ok) {
                // Reload history from server
                await loadHistory();
            }
        } catch (err) {
            alert('Failed to delete video');
        }
    }
}

// Clear all history
async function clearAllHistory() {
    if (confirm('Clear all download history? This will delete all video files.')) {
        try {
            const res = await fetch('/api/history/clear', {
                method: 'POST'
            });
            
            if (res.ok) {
                downloadHistory = [];
                renderHistory();
            }
        } catch (err) {
            alert('Failed to clear history');
        }
    }
}

// Load history on page load
loadHistory();

async function start() {
    const url = document.getElementById("url").value;
    const cookies = document.getElementById("cookies").value;
    const format = document.getElementById("format").value;
    const status = document.getElementById("status");

    status.textContent = "Processing...";

    const form = new FormData();
    form.append("url", url);
    form.append("cookies", cookies);
    form.append("format", format);

    try {
        const res = await fetch("/api/download", {
            method: "POST",
            body: form
        });

        const data = await res.json();

        if (data.error) {
            if (data.error === "Unauthorized") {
                window.location.href = "/";
                return;
            }
            status.textContent = data.error;
            return;
        }

        currentVideoFile = data.file;
        
        // Reload history from server
        await loadHistory();
        
        const format = document.getElementById("format").value;
        const isAudio = format === 'mp3' || format === 'm4a';
        
        if (isAudio) {
            status.innerHTML = `
                <a href="${data.file}" style="color:#4ea3ff;text-decoration:none;padding:10px 20px;margin:5px;display:inline-block;">⬇️ Download Audio</a>
            `;
        } else {
            status.innerHTML = `
                <button onclick="playVideo()" style="background:#4ea3ff;border:none;border-radius:6px;color:white;padding:10px 20px;margin:5px;cursor:pointer;font-size:14px;">▶️ Watch Now</button>
                <a href="${data.file}" style="color:#4ea3ff;text-decoration:none;padding:10px 20px;margin:5px;display:inline-block;">⬇️ Download</a>
            `;
        }

    } catch {
        status.textContent = "Request failed";
    }
}

function playVideo() {
    if (!currentVideoFile) return;
    
    const videoPlayer = document.getElementById("videoPlayer");
    const videoSource = document.getElementById("videoSource");
    const video = document.getElementById("video");
    
    videoSource.src = currentVideoFile;
    video.load();
    videoPlayer.style.display = "block";
    
    // Scroll to video player
    videoPlayer.scrollIntoView({ behavior: "smooth", block: "center" });
}

function hideVideo() {
    const videoPlayer = document.getElementById("videoPlayer");
    const video = document.getElementById("video");
    
    video.pause();
    videoPlayer.style.display = "none";
}

function downloadVideo() {
    if (!currentVideoFile) return;
    window.location.href = currentVideoFile;
}

async function logout() {
    try {
        await fetch("/api/logout", { method: "POST" });
        window.location.href = "/";
    } catch {
        window.location.href = "/";
    }
}

// Cleanup on page unload
window.addEventListener('beforeunload', () => {
    const video = document.getElementById('video');
    if (video) {
        video.pause();
        video.src = '';
    }
});
</script>

</body>
</html>
