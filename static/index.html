<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Downloader</title>

<style>
body {
    margin:0;
    font-family: Arial, sans-serif;
    background:#121212;
    color:white;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
    min-height:100vh;
    padding:20px;
}

.container {
    background:#1e1e1e;
    padding:30px;
    border-radius:12px;
    box-shadow:0 0 20px rgba(0,0,0,0.4);
    text-align:center;
    margin-bottom:20px;
    max-width:800px;
    width:100%;
}

input {
    width:320px;
    padding:10px;
    margin:10px 0;
}

button {
    padding:10px 18px;
    cursor:pointer;
}

#videoPlayer {
    display:none;
    background:#1e1e1e;
    padding:20px;
    border-radius:12px;
    box-shadow:0 0 20px rgba(0,0,0,0.4);
    max-width:800px;
    width:100%;
}

#videoPlayer video {
    width:100%;
    max-width:100%;
    border-radius:8px;
}

.video-controls {
    margin-top:15px;
    display:flex;
    gap:10px;
    justify-content:center;
}
</style>
</head>

<body>

<div class="container">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
        <h2 style="margin:0;">Video Downloader</h2>
        <button onclick="logout()" style="padding:6px 12px;font-size:12px;background:#ff5555;border:none;border-radius:4px;color:white;cursor:pointer;">Logout</button>
    </div>

    <input id="url" placeholder="Paste video URL">
    <br>
    <textarea id="cookies" placeholder="Paste cookies (optional - for YouTube bot protection)" rows="4" style="width:320px;margin:10px 0;padding:10px;font-size:12px;"></textarea>
    <br>
    <button onclick="start()">Download</button>

    <p id="status"></p>
    <p style="font-size:11px;color:#888;margin-top:20px;">
        📝 Cookies optional - we auto-fallback to Invidious for YouTube!<br>
        <a href="https://github.com/yt-dlp/yt-dlp/wiki/FAQ#how-do-i-pass-cookies-to-yt-dlp" target="_blank" style="color:#4ea3ff;">How to export cookies</a>
    </p>
</div>

<div id="videoPlayer">
    <video id="video" controls>
        <source id="videoSource" type="video/mp4">
        Your browser does not support the video tag.
    </video>
    <div class="video-controls">
        <button onclick="downloadVideo()" style="background:#4ea3ff;border:none;border-radius:4px;color:white;cursor:pointer;">Download Video</button>
        <button onclick="hideVideo()" style="background:#ff5555;border:none;border-radius:4px;color:white;cursor:pointer;">Close Player</button>
    </div>
</div>

<script>
let currentVideoFile = null;

async function start() {
    const url = document.getElementById("url").value;
    const cookies = document.getElementById("cookies").value;
    const status = document.getElementById("status");

    status.textContent = "Processing...";

    const form = new FormData();
    form.append("url", url);
    form.append("cookies", cookies);

    try {
        const res = await fetch("/api/download", {
            method: "POST",
            body: form
        });

        const data = await res.json();

        if (data.error) {
            if (data.error === "Unauthorized") {
                window.location.href = "/";
                return;
            }
            status.textContent = data.error;
            return;
        }

        currentVideoFile = data.file;
        status.innerHTML = `
            <button onclick="playVideo()" style="background:#4ea3ff;border:none;border-radius:6px;color:white;padding:10px 20px;margin:5px;cursor:pointer;font-size:14px;">▶️ Watch Now</button>
            <a href="${data.file}" style="color:#4ea3ff;text-decoration:none;padding:10px 20px;margin:5px;display:inline-block;">⬇️ Download</a>
        `;

    } catch {
        status.textContent = "Request failed";
    }
}

function playVideo() {
    if (!currentVideoFile) return;
    
    const videoPlayer = document.getElementById("videoPlayer");
    const videoSource = document.getElementById("videoSource");
    const video = document.getElementById("video");
    
    videoSource.src = currentVideoFile;
    video.load();
    videoPlayer.style.display = "block";
    
    // Scroll to video player
    videoPlayer.scrollIntoView({ behavior: "smooth", block: "center" });
}

function hideVideo() {
    const videoPlayer = document.getElementById("videoPlayer");
    const video = document.getElementById("video");
    
    video.pause();
    videoPlayer.style.display = "none";
}

function downloadVideo() {
    if (!currentVideoFile) return;
    window.location.href = currentVideoFile;
}

async function logout() {
    try {
        await fetch("/api/logout", { method: "POST" });
        window.location.href = "/";
    } catch {
        window.location.href = "/";
    }
}

// Cleanup on page unload
window.addEventListener('beforeunload', () => {
    const video = document.getElementById('video');
    if (video) {
        video.pause();
        video.src = '';
    }
});
</script>

</body>
</html>
