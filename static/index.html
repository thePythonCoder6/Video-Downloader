<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Downloader</title>

<style>
body {
    margin:0;
    font-family: Arial, sans-serif;
    background:#121212;
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    height:100vh;
}

.container {
    background:#1e1e1e;
    padding:30px;
    border-radius:12px;
    box-shadow:0 0 20px rgba(0,0,0,0.4);
    text-align:center;
}

input {
    width:320px;
    padding:10px;
    margin:10px 0;
}

button {
    padding:10px 18px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="container">
    <h2>Video Downloader</h2>

    <input id="url" placeholder="Paste video URL">
    <br>
    <textarea id="cookies" placeholder="Paste cookies (optional - for YouTube bot protection)" rows="4" style="width:320px;margin:10px 0;padding:10px;font-size:12px;"></textarea>
    <br>
    <button onclick="start()">Download</button>

    <p id="status"></p>
    <p style="font-size:11px;color:#888;margin-top:20px;">
        📝 Cookies optional - we auto-fallback to Invidious for YouTube!<br>
        <a href="https://github.com/yt-dlp/yt-dlp/wiki/FAQ#how-do-i-pass-cookies-to-yt-dlp" target="_blank" style="color:#4ea3ff;">How to export cookies</a>
    </p>
</div>

<script>
async function start() {
    const url = document.getElementById("url").value;
    const cookies = document.getElementById("cookies").value;
    const status = document.getElementById("status");

    status.textContent = "Processing...";

    const form = new FormData();
    form.append("url", url);
    form.append("cookies", cookies);

    try {
        const res = await fetch("/api/download", {
            method: "POST",
            body: form
        });

        const data = await res.json();

        if (data.error) {
            status.textContent = data.error;
            return;
        }

        status.innerHTML =
            `<a href="${data.file}" style="color:#4ea3ff">Download file</a>`;

    } catch {
        status.textContent = "Request failed";
    }
}
</script>

</body>
</html>
